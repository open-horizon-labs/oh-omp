name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust static analysis ──────────────────────────────────────────────
  # Owns: cargo fmt, clippy, cargo check. No JS, no native build.
  rust:
    runs-on: namespace-profile-default
    env:
      RUSTFLAGS: -C target-cpu=x86-64-v3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Check
        run: cargo check --workspace

  # ── Native addon build matrix ────────────────────────────────────────
  # Owns: compiling Rust → .node for each platform/arch/variant.
  # Produces upload artifacts consumed by test and contracts jobs.
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            variants: "baseline modern"
            runner: namespace-profile-default
          - platform: darwin
            arch: arm64
            runner: namespace-profile-tahoe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Build native addon(s)
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          VARIANTS="${{ matrix.variants }}"
          if [ -z "$VARIANTS" ]; then
            bun --cwd=packages/natives run build:native
          else
            for variant in $VARIANTS; do
              case "$variant" in
                baseline) export RUSTFLAGS="-C target-cpu=x86-64-v2" ;;
                modern)   export RUSTFLAGS="-C target-cpu=x86-64-v3" ;;
              esac
              export TARGET_VARIANT="$variant"
              bun --cwd=packages/natives run build:native
            done
          fi
      - name: Upload native addon(s)
        uses: actions/upload-artifact@v4
        with:
          name: pi-natives-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/natives/native/pi_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          if-no-files-found: error

  # ── TypeScript static analysis ──────────────────────────────────────
  # Owns: biome lint/format checks and tsgo type checking.
  # No native build needed — type definitions live in .ts source files.
  check:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - run: bun install --frozen-lockfile
      - run: bun check:ts

  # ── Test suites ──────────────────────────────────────────────────────
  # Owns: bun test (all workspaces) and CLI smoke tests.
  # Downloads pre-built native artifacts — does NOT rebuild them.
  test:
    needs: [native]
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - name: Download native addon
        uses: actions/download-artifact@v4
        with:
          name: pi-natives-linux-x64
          path: packages/natives/native/
      - run: bun run test
      - name: CLI smoke test
        run: |
          bun packages/coding-agent/src/cli.ts --version
          bun packages/coding-agent/src/cli.ts --help
          bun packages/coding-agent/src/cli.ts stats --help

  # ── Contract tests ───────────────────────────────────────────────────
  # Owns: RPC compatibility and memory contract suites.
  # Downloads pre-built native artifacts — does NOT rebuild them.
  contracts:
    needs: [native]
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - name: Download native addon
        uses: actions/download-artifact@v4
        with:
          name: pi-natives-linux-x64
          path: packages/natives/native/
      - name: Run contract suites
        run: |
          bun --cwd=packages/coding-agent test test/rpc-compatibility-contract.test.ts
          bun --cwd=packages/coding-agent test test/memory-contract.test.ts


  # ── Install method smoke tests ────────────────────────────────────────
  # Owns: verifying that published install paths work end-to-end.
  install_methods:
    runs-on: namespace-profile-default
    env:
      RUSTFLAGS: -C target-cpu=x86-64-v3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: dtolnay/rust-toolchain@nightly
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - name: Install method smoke tests
        run: bash scripts/install-tests/run-ci.sh
